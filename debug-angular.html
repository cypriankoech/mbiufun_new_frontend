<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Angular Bootstrap</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .debug { background: #f0f0f0; padding: 10px; border: 1px solid #ccc; margin: 10px 0; }
        .error { color: red; }
        .success { color: green; }
        iframe { width: 100%; height: 400px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>🔧 Angular Bootstrap Debug</h1>
    <div class="debug">
        <h3>Debugging Angular Bootstrap Issue</h3>
        <div id="status">Loading...</div>
        <div id="errors"></div>
    </div>

    <h3>Angular App (in iframe):</h3>
    <iframe id="angularFrame" src="http://localhost:4200"></iframe>

    <script>
        const statusDiv = document.getElementById('status');
        const errorsDiv = document.getElementById('errors');
        const frame = document.getElementById('angularFrame');

        let originalConsoleLog = console.log;
        let originalConsoleError = console.error;

        // Override console methods to capture Angular messages
        console.log = function(...args) {
            originalConsoleLog.apply(console, args);
            statusDiv.innerHTML += '<div class="success">LOG: ' + args.join(' ') + '</div>';
        };

        console.error = function(...args) {
            originalConsoleError.apply(console, args);
            errorsDiv.innerHTML += '<div class="error">ERROR: ' + args.join(' ') + '</div>';
        };

        // Test if we can access the frame content
        frame.onload = function() {
            try {
                const frameDoc = frame.contentDocument || frame.contentWindow.document;
                const appRoot = frameDoc.querySelector('app-root');

                if (appRoot) {
                    statusDiv.innerHTML += '<div>✅ Found app-root element</div>';
                    statusDiv.innerHTML += '<div>App-root content: "' + appRoot.innerHTML + '"</div>';

                    if (appRoot.innerHTML.trim() === '') {
                        statusDiv.innerHTML += '<div class="error">❌ App-root is empty - Angular bootstrap failed</div>';
                    } else {
                        statusDiv.innerHTML += '<div class="success">✅ App-root has content - Angular is working</div>';
                    }
                } else {
                    statusDiv.innerHTML += '<div class="error">❌ App-root element not found</div>';
                }

                // Check for JavaScript errors
                const scripts = frameDoc.querySelectorAll('script');
                statusDiv.innerHTML += '<div>Found ' + scripts.length + ' script tags</div>';

            } catch (e) {
                errorsDiv.innerHTML += '<div class="error">❌ Cannot access iframe content: ' + e.message + '</div>';
            }
        };

        frame.onerror = function() {
            errorsDiv.innerHTML += '<div class="error">❌ Failed to load Angular app</div>';
        };

        // Test direct fetch
        setTimeout(() => {
            fetch('http://localhost:4200')
                .then(response => response.text())
                .then(html => {
                    statusDiv.innerHTML += '<div>✅ Direct fetch successful, HTML length: ' + html.length + '</div>';

                    if (html.includes('Angular bootstrap failed')) {
                        errorsDiv.innerHTML += '<div class="error">❌ Angular bootstrap failed (found error message in HTML)</div>';
                    }

                    if (!html.includes('<app-root>')) {
                        errorsDiv.innerHTML += '<div class="error">❌ No app-root element in HTML</div>';
                    }
                })
                .catch(error => {
                    errorsDiv.innerHTML += '<div class="error">❌ Direct fetch failed: ' + error.message + '</div>';
                });
        }, 2000);

        statusDiv.innerHTML = '<div>🔄 Debug page loaded, testing Angular...</div>';
    </script>
</body>
</html>
